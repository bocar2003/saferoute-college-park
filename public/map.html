<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crime Map</title>
  <link rel="stylesheet" href="/styles.css">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

<nav>
  <div class="logo">SafeRoute College Park</div>
  <div>
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/map">Crime Map</a>
    <a href="/report">Report</a>
  </div>
</nav>

<section class="card">
  <h1>College Park Crime Map</h1>
  <p>
    This map loads public crime data through the backend.
    If exact coordinates are missing, the app still places sample markers
    around College Park so the map always displays.
  </p>

  <select id="crimeFilter">
    <option value="all">Show All Types</option>
  </select>

  <div id="map"></div>
</section>

<script src="/app.js"></script>
</body>
</html>
